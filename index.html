<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대기안정성과 폼로켓 사전 퀴즈</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 36px 32px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .intro h1 { font-size: 1.6rem; margin-bottom: 10px; line-height: 1.4; }
    .intro p { color: #ccc; font-size: 0.95rem; margin-bottom: 28px; line-height: 1.6; }
    .rocket-icon { font-size: 3rem; margin-bottom: 16px; }
    .progress-bar-wrap { background: rgba(255,255,255,0.1); border-radius: 10px; height: 8px; margin-bottom: 8px; }
    .progress-bar { height: 8px; border-radius: 10px; background: linear-gradient(90deg, #f7971e, #ffd200); transition: width 0.4s ease; }
    .progress-label { font-size: 0.8rem; color: #aaa; margin-bottom: 20px; }
    .question-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; line-height: 1.6; }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option-btn {
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 14px 18px;
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }
    .option-btn:hover:not(:disabled) { background: rgba(255,255,255,0.15); border-color: #ffd200; }
    .option-btn.correct { background: rgba(72,199,142,0.25); border-color: #48c78e; }
    .option-btn.wrong { background: rgba(241,70,104,0.25); border-color: #f14668; }
    .feedback { margin-top: 16px; padding: 14px 16px; border-radius: 10px; font-size: 0.9rem; line-height: 1.6; display: none; }
    .feedback.show { display: block; }
    .feedback.correct-fb { background: rgba(72,199,142,0.15); border: 1px solid #48c78e; }
    .feedback.wrong-fb  { background: rgba(241,70,104,0.15); border: 1px solid #f14668; }
    .next-btn {
      margin-top: 20px; width: 100%; padding: 14px; border: none; border-radius: 12px;
      background: linear-gradient(90deg, #f7971e, #ffd200); color: #1a1a2e;
      font-size: 1rem; font-weight: 700; cursor: pointer; display: none;
    }
    .next-btn.show { display: block; }
    .result { text-align: center; }
    .result .score {
      font-size: 3.5rem; font-weight: 800;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin: 16px 0 8px;
    }
    .result .score-label { color: #ccc; margin-bottom: 24px; }
    .result .message { font-size: 1.1rem; line-height: 1.7; color: #ddd; margin-bottom: 28px; }
    .retry-btn { padding: 14px 32px; border: none; border-radius: 12px; background: linear-gradient(90deg, #f7971e, #ffd200); color: #1a1a2e; font-size: 1rem; font-weight: 700; cursor: pointer; }
    .start-btn { margin-top: 8px; width: 100%; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(90deg, #f7971e, #ffd200); color: #1a1a2e; font-size: 1.05rem; font-weight: 700; cursor: pointer; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="card">

  <div id="intro">
    <div class="rocket-icon">🚀</div>
    <div class="intro">
      <h1>대기안정성과 비행<br>(폼로켓) 사전 퀴즈</h1>
      <p>수업 전 내 생각을 확인해봐요!<br>총 5문제 · 틀려도 괜찮아요 😊</p>
    </div>
    <button class="start-btn" onclick="startQuiz()">퀴즈 시작하기 🚀</button>
  </div>

  <div id="quiz" class="hidden">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">1 / 5</div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
  </div>

  <div id="result" class="hidden result">
    <div class="rocket-icon">🏆</div>
    <div class="score" id="scoreText"></div>
    <div class="score-label">5문제 중</div>
    <div class="message" id="resultMessage"></div>
    <button class="retry-btn" onclick="restartQuiz()">다시 풀기 🔄</button>
  </div>

</div>
<script>
const questions = [
  {
    q: "1️⃣ 로켓이 안정적으로 날기 위해 가장 중요한 것은 무엇일까요?",
    options: ["로켓의 색깔", "무게중심이 앞쪽에 있는 것", "로켓이 최대한 가벼운 것", "로켓이 최대한 짧은 것"],
    answer: 1,
    explanation: "무게중심이 앞쪽에 있어야 로켓이 안정적으로 날아요. 무게중심이 뒤쪽에 있으면 로켓이 흔들리거나 뒤집힐 수 있어요."
  },
  {
    q: "2️⃣ 로켓의 무게중심이 뒤쪽에 있으면 어떤 일이 일어날 가능성이 높을까요?",
    options: ["더 멀리 날아간다", "똑바로 안정적으로 날아간다", "공중에서 흔들리거나 뒤집힌다", "더 빨리 떨어진다"],
    answer: 2,
    explanation: "무게중심이 뒤쪽에 있으면 공기 저항에 의해 쉽게 방향을 잃고 흔들리거나 뒤집혀요. 안정적인 비행을 위해 무게중심은 앞쪽에 있어야 해요."
  },
  {
    q: "3️⃣ 로켓 뒤쪽에 날개(핀, fin)를 다는 이유는 무엇일까요?",
    options: ["멋있어 보이기 위해", "로켓의 속도를 줄이기 위해", "로켓이 똑바로 날도록 방향을 안정시키기 위해", "로켓을 무겁게 만들기 위해"],
    answer: 2,
    explanation: "날개(핀)는 압력중심을 뒤쪽으로 이동시켜 로켓이 똑바로 날 수 있도록 방향을 안정시켜요. 화살의 깃털과 같은 역할이에요!"
  },
  {
    q: "4️⃣ 공기 속을 빠르게 움직일 때 물체에 작용하는 힘은 무엇일까요?",
    options: ["자기력", "중력", "공기저항", "전기력"],
    answer: 2,
    explanation: "공기 속을 빠르게 움직이면 공기저항이 작용해요. 운동 방향의 반대로 작용하며 속도를 줄이는 역할을 해요. 폼로켓도 날아가면서 공기저항을 받아요."
  },
  {
    q: "5️⃣ 폼로켓의 앞부분을 조금 무겁게 만들면 어떤 효과가 있을까요?",
    options: ["더 많이 흔들린다", "더 안정적으로 날 가능성이 높다", "속도가 느려진다", "날지 않는다"],
    answer: 1,
    explanation: "앞부분을 무겁게 하면 무게중심이 앞쪽으로 이동해요. 무게중심이 압력중심보다 앞에 있을수록 로켓이 더 안정적으로 날아요!"
  }
];

let current = 0, score = 0, answered = false;

function startQuiz() {
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('progressBar').style.width = ((current / questions.length) * 100) + '%';
  document.getElementById('progressLabel').textContent = (current + 1) + ' / ' + questions.length;
  document.getElementById('questionText').textContent = q.q;

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    optionsEl.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.className = 'next-btn';
  nextBtn.textContent = current === questions.length - 1 ? '결과 보기 🏁' : '다음 문제 →';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  const fb = document.getElementById('feedback');
  if (idx === q.answer) {
    score++;
    btns[idx].classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fb.textContent = '✅ 정답! ' + q.explanation;
  } else {
    btns[idx].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    fb.className = 'feedback wrong-fb show';
    fb.textContent = '❌ 아쉽지만 오답! ' + q.explanation;
  }
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  current++;
  if (current >= questions.length) showResult();
  else loadQuestion();
}

function showResult() {
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('scoreText').textContent = score + '점';
  const messages = [
    "아직 배울 게 많아요! 수업 후에 다시 도전해봐요 💪",
    "조금 더 알아볼까요? 수업이 기대되네요 😊",
    "절반 이상 맞혔어요! 꽤 알고 있는데요? 🙌",
    "훌륭해요! 대기와 로켓에 대해 잘 알고 있군요 🌟",
    "완벽해요! 로켓 과학자 등장! 🚀🎉"
  ];
  document.getElementById('resultMessage').textContent = messages[score];
}

function restartQuiz() {
  current = 0; score = 0; answered = false;
  document.getElementById('result').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  loadQuestion();
}
</script>
</body>
</html>
