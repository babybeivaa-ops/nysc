<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>로켓 안정성 시뮬레이션</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  min-height: 100vh; color: #fff; padding: 20px;
}
h1 { text-align: center; color: #ffd700; font-size: 1.4rem; margin-bottom: 6px; padding-top: 10px; }
.subtitle { text-align: center; color: #8899cc; font-size: 0.85rem; margin-bottom: 24px; }
.sim-wrap { max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
.control-card {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px; padding: 20px 24px;
}
.control-card h2 { font-size: 1rem; color: #ffd700; margin-bottom: 14px; }
.slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.slider-row label { font-size: 0.85rem; color: #aabbdd; width: 90px; flex-shrink: 0; }
input[type=range] { flex: 1; accent-color: #ffd700; }
.slider-val { font-size: 0.85rem; color: #ffd700; width: 60px; text-align: right; }
.toggle-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
.toggle-btn {
  padding: 8px 18px; border-radius: 20px; border: 1.5px solid #334;
  background: rgba(255,255,255,0.05); color: #aabbdd;
  cursor: pointer; font-size: 0.85rem; transition: all 0.2s;
}
.toggle-btn.active { background: rgba(255,215,0,0.15); border-color: #ffd700; color: #ffd700; font-weight: 700; }
canvas { width: 100%; border-radius: 12px; background: #080c1a; border: 1px solid #1a2a5a; display: block; }
.status-bar {
  display: flex; gap: 16px; flex-wrap: wrap;
  background: rgba(0,0,0,0.3); border-radius: 10px; padding: 12px 16px;
}
.status-item { font-size: 0.82rem; }
.status-item span { color: #ffd700; font-weight: 700; }
.explain-box {
  background: rgba(255,215,0,0.06); border: 1px solid #3a3000; border-radius: 10px;
  padding: 14px 16px; font-size: 0.85rem; color: #ccbb66; line-height: 1.7;
}
.explain-box strong { color: #ffd700; }
.btn-row { display: flex; gap: 10px; }
.sim-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
.btn-launch { background: linear-gradient(90deg, #f7971e, #ffd200); color: #1a1a2e; }
.btn-reset  { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #334; }
.sim-btn:hover { opacity: 0.85; }
</style>
</head>
<body>
<h1>🚀 로켓 안정성 시뮬레이션</h1>
<p class="subtitle">무게중심과 날개 위치를 바꿔서 로켓이 어떻게 날아가는지 확인해봐요!</p>

<div class="sim-wrap">
  <div class="control-card">
    <h2>⚙️ 로켓 설정</h2>
    <div class="slider-row">
      <label>무게중심 위치</label>
      <input type="range" id="cgSlider" min="20" max="80" value="35" oninput="updateCG(this.value)">
      <div class="slider-val" id="cgVal">앞쪽 35%</div>
    </div>
    <div class="slider-row">
      <label>날개(핀) 크기</label>
      <input type="range" id="finSlider" min="0" max="40" value="20" oninput="updateFin(this.value)">
      <div class="slider-val" id="finVal">중간</div>
    </div>
    <div class="toggle-row">
      <div style="font-size:0.82rem;color:#8899cc;width:100%;margin-bottom:4px;">초기 자세 흔들림</div>
      <button class="toggle-btn active" onclick="setTilt(5)" id="tilt5">약간</button>
      <button class="toggle-btn" onclick="setTilt(20)" id="tilt20">보통</button>
      <button class="toggle-btn" onclick="setTilt(40)" id="tilt40">많이</button>
    </div>
  </div>

  <canvas id="simCanvas" height="320"></canvas>

  <div class="status-bar">
    <div class="status-item">무게중심: <span id="stCG">앞쪽</span></div>
    <div class="status-item">날개: <span id="stFin">있음</span></div>
    <div class="status-item">안정성: <span id="stStability">-</span></div>
    <div class="status-item">현재 각도: <span id="stAngle">0°</span></div>
  </div>

  <div class="explain-box" id="explainBox">
    설정을 바꾸고 🚀 발사! 버튼을 눌러보세요.
  </div>

  <div class="btn-row">
    <button class="sim-btn btn-launch" onclick="launch()">🚀 발사!</button>
    <button class="sim-btn btn-reset" onclick="resetSim()">↺ 초기화</button>
  </div>
</div>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const w = canvas.offsetWidth || 660;
  canvas.width = w;
  canvas.height = 320;
}

// offsetWidth가 0일 수 있으므로 DOM 완전 렌더링 후 실행
window.addEventListener('load', () => { resizeCanvas(); drawStatic(); });
window.addEventListener('resize', () => { resizeCanvas(); drawStatic(); });

let cgPos = 35, finSize = 20, tiltAngle = 5;
let animId = null, launched = false;
let rocket = {};

const stars = Array.from({length: 60}, (_, i) => ({
  x: (i * 137) % 700, y: (i * 97) % 320,
  r: Math.random() * 1.2 + 0.3, a: Math.random() * 0.5 + 0.2
}));

function updateCG(v) {
  cgPos = parseInt(v);
  document.getElementById('cgVal').textContent =
    cgPos <= 40 ? `앞쪽 ${cgPos}%` : cgPos >= 60 ? `뒤쪽 ${cgPos}%` : `중간 ${cgPos}%`;
  updateStatus();
  if (!launched) drawStatic();
}

function updateFin(v) {
  finSize = parseInt(v);
  const labels = ['없음','작음','중간','큼','매우 큼'];
  document.getElementById('finVal').textContent = labels[Math.round(finSize / 10)];
  updateStatus();
  if (!launched) drawStatic();
}

function setTilt(v) {
  tiltAngle = v;
  ['tilt5','tilt20','tilt40'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById(v === 5 ? 'tilt5' : v === 20 ? 'tilt20' : 'tilt40').classList.add('active');
}

function getCpPos() {
  // 압력중심: fin 없으면 몸통 중앙(50%), fin 있으면 최대 65%까지만 이동
  // 날개가 아무리 커도 무게중심이 뒤쪽이면 불안정
  return 50 + finSize * 0.375; // fin=40 → cpPos=65 (최대)
}
function isStableConfig() { return cgPos < getCpPos(); }

function updateStatus() {
  document.getElementById('stCG').textContent = cgPos <= 40 ? '앞쪽 ✅' : cgPos >= 60 ? '뒤쪽 ⚠️' : '중간';
  document.getElementById('stFin').textContent = finSize > 5 ? `있음 (크기 ${finSize})` : '없음 ⚠️';
  const stable = isStableConfig();
  document.getElementById('stStability').textContent = stable ? '안정 🟢' : cgPos > 60 ? '불안정 🔴' : '불안정 🟡';
}

function getExplain() {
  const stable = isStableConfig();
  const cgFront = cgPos <= 45, hasFin = finSize >= 10;
  if (stable && cgFront && hasFin)
    return `<strong>✅ 안정적인 비행!</strong><br>무게중심이 압력중심보다 앞에 있어서 흔들려도 원래 자세로 돌아와요. 화살이나 셔틀콕과 같은 원리예요!`;
  if (!stable && !hasFin)
    return `<strong>🔴 매우 불안정!</strong><br>날개가 없어 압력중심이 중앙에 있고, 무게중심이 뒤쪽이에요. 공기 저항에 의해 빠르게 뒤집혀버려요.`;
  if (!stable)
    return `<strong>🟡 불안정!</strong><br>날개가 있어도 무게중심이 압력중심보다 뒤쪽이면 불안정해요. 앞에 너트를 넣어 무게중심을 앞으로 옮겨보세요!`;
  return `<strong>🟡 날개가 부족해요!</strong><br>무게중심은 앞쪽이지만 날개가 없거나 너무 작아요. 날개를 키우면 압력중심이 뒤로 이동해서 안정적으로 날아요.`;
}

function drawBackground(W, H) {
  ctx.fillStyle = '#080c1a'; ctx.fillRect(0, 0, W, H);
  stars.forEach(s => {
    ctx.beginPath(); ctx.arc(s.x % W, s.y % H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`; ctx.fill();
  });
  ctx.fillStyle = '#1a3a1a'; ctx.fillRect(0, H - 30, W, 30);
  ctx.fillStyle = '#2a5a2a'; ctx.fillRect(0, H - 30, W, 4);
}



function drawRocket(x, y, angleDeg, cgRatio, fin) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angleDeg * Math.PI / 180);
  const len = 60, r = 8;
  const cgX = len / 2 - len * (cgRatio / 100);

  ctx.beginPath(); ctx.roundRect(-len/2, -r, len, r*2, 4);
  ctx.fillStyle = '#c8d8ff'; ctx.fill();

  ctx.beginPath();
  ctx.moveTo(len/2, -r); ctx.lineTo(len/2+18, 0); ctx.lineTo(len/2, r);
  ctx.fillStyle = '#ffd700'; ctx.fill();

  if (fin > 0) {
    const fw = fin*0.6, fh = fin*0.5+4;
    ctx.beginPath();
    ctx.moveTo(-len/2,-r); ctx.lineTo(-len/2-fw,-r-fh); ctx.lineTo(-len/2+8,-r);
    ctx.fillStyle = '#f7971e'; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-len/2,r); ctx.lineTo(-len/2-fw,r+fh); ctx.lineTo(-len/2+8,r);
    ctx.fillStyle = '#f7971e'; ctx.fill();
  }

  ctx.beginPath();
  ctx.moveTo(-len/2, -r*0.6);
  ctx.lineTo(-len/2 - 14 - Math.random()*6, 0);
  ctx.lineTo(-len/2, r*0.6);
  ctx.fillStyle = 'rgba(255,120,0,0.8)'; ctx.fill();

  ctx.beginPath(); ctx.arc(cgX, 0, 5, 0, Math.PI*2);
  ctx.fillStyle = '#ff4466'; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();

  ctx.font = '11px Segoe UI'; ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center';
  ctx.fillText('무게중심', cgX, -12);
  ctx.restore();
}

function drawStatic() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  drawBackground(W, H);
  ctx.fillStyle = '#556';
  ctx.fillRect(W/2-6, H-80, 12, 50);
  ctx.fillRect(W/2-20, H-80, 40, 8);
  drawRocket(W/2, H-100, -90, cgPos, finSize);
}

function launch() {
  if (animId) cancelAnimationFrame(animId);
  launched = true;
  const W = canvas.width, H = canvas.height;
  const launchAngle = -90 + tiltAngle;
  const rad = launchAngle * Math.PI / 180;
  const stable = isStableConfig();
  rocket = {
    x: W/2, y: H-100,
    angle: launchAngle,
    angularVel: stable ? 0 : 0.6,
    vx: Math.cos(rad) * 3.2,
    vy: Math.sin(rad) * 3.2,
    trail: [],
    burnFrames: 28,
    tumbleSeed: stable ? 0 : (Math.random() > 0.5 ? 1 : -1)
  };
  if (!stable) {
    rocket.vx += Math.cos((launchAngle - 8 * rocket.tumbleSeed) * Math.PI / 180) * 0.35;
    rocket.vy += Math.sin((launchAngle - 8 * rocket.tumbleSeed) * Math.PI / 180) * 0.35;
  }
  document.getElementById('explainBox').innerHTML = getExplain();
  updateStatus();
  animate();
}

function animate() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  drawBackground(W, H);

  const cpPos = getCpPos();
  const stable = cgPos < cpPos;
  const margin = cpPos - cgPos;

  const velDir = Math.atan2(rocket.vy, rocket.vx) * 180 / Math.PI;
  let aoa = rocket.angle - velDir;
  while (aoa > 180) aoa -= 360;
  while (aoa < -180) aoa += 360;

  const disturbance = (!stable) ? rocket.tumbleSeed * (0.45 + Math.min(Math.abs(margin), 25) * 0.015) : 0;
  const effectiveAoA = aoa + disturbance;
  const aoaAbs = Math.abs(effectiveAoA);
  const aoaSign = effectiveAoA === 0 ? 0 : Math.sign(effectiveAoA);
  const aoaFactor = Math.min(aoaAbs / 12, 2.5);

  let torque = 0;
  if (stable) {
    torque = -aoaSign * 0.08 * Math.max(margin, 5) / 25 * aoaFactor;
  } else {
    torque = aoaSign * (0.18 + Math.abs(margin) * 0.01) * aoaFactor;
    if (aoaAbs > 25) torque += aoaSign * 0.08;
  }

  rocket.angularVel += torque;
  rocket.angularVel *= stable ? 0.90 : 0.992;
  rocket.angle += rocket.angularVel;

  if (rocket.burnFrames > 0) {
    const thrustRad = rocket.angle * Math.PI / 180;
    rocket.vx += Math.cos(thrustRad) * 0.24;
    rocket.vy += Math.sin(thrustRad) * 0.24;
    rocket.burnFrames--;
  }

  rocket.vx *= 0.992;
  rocket.vy = rocket.vy * 0.992 + 0.015;

  if (!stable && aoaAbs > 18) {
    rocket.vx *= 0.985;
    rocket.vy *= 0.985;
  }

  const spd = Math.hypot(rocket.vx, rocket.vy);
  if (spd > 5) { rocket.vx *= 5/spd; rocket.vy *= 5/spd; }

  rocket.x += rocket.vx;
  rocket.y += rocket.vy;

  rocket.trail.push({ x: rocket.x, y: rocket.y });
  if (rocket.trail.length > 80) rocket.trail.shift();
  for (let i = 1; i < rocket.trail.length; i++) {
    const t = rocket.trail[i];
    ctx.beginPath(); ctx.arc(t.x, t.y, 2, 0, Math.PI*2);
    ctx.fillStyle = `rgba(247,151,30,${(i/rocket.trail.length)*0.5})`; ctx.fill();
  }

  drawRocket(rocket.x, rocket.y, rocket.angle, cgPos, finSize);

  document.getElementById('stAngle').textContent = Math.round(rocket.angle + 90) + '°';

  if (rocket.y < -50 || rocket.y > H+50 || rocket.x < -100 || rocket.x > W+100) {
    launched = false;
    return;
  }
  animId = requestAnimationFrame(animate);
}

function resetSim() {
  if (animId) cancelAnimationFrame(animId);
  launched = false;
  document.getElementById('explainBox').innerHTML = '설정을 바꾸고 🚀 발사! 버튼을 눌러보세요.';
  document.getElementById('stAngle').textContent = '0°';
  drawStatic();
}

updateStatus();
</script>
</body>
</html>
