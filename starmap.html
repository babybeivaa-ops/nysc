<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <title>고흥 밤하늘 관측 가이드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #050a1a;
      color: #e0e8ff;
      min-height: 100vh;
    }
    header {
      text-align: center;
      padding: 36px 20px 20px;
      background: radial-gradient(ellipse at top, #0d1b4b 0%, #050a1a 70%);
      border-bottom: 1px solid #1a2a5a;
    }
    header h1 { font-size: 1.7rem; color: #ffd700; letter-spacing: 1px; }
    header p { color: #8899cc; font-size: 0.9rem; margin-top: 6px; }
    .month-tabs {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 6px; padding: 20px 16px 0;
    }
    .tab-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid #1e3060;
      border-radius: 20px;
      padding: 7px 16px;
      color: #8899cc;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .tab-btn:hover { background: rgba(255,215,0,0.1); border-color: #ffd700; color: #ffd700; }
    .tab-btn.active { background: rgba(255,215,0,0.15); border-color: #ffd700; color: #ffd700; font-weight: 700; }
    .content { max-width: 720px; margin: 24px auto; padding: 0 16px 60px; }
    .month-panel { display: none; }
    .month-panel.active { display: block; }
    .month-title {
      font-size: 1.3rem; color: #ffd700; margin-bottom: 6px;
    }
    .month-desc { color: #8899cc; font-size: 0.88rem; margin-bottom: 20px; line-height: 1.6; }
    .section { margin-bottom: 22px; }
    .section-title {
      font-size: 0.78rem; letter-spacing: 2px; text-transform: uppercase;
      color: #4a6fa5; margin-bottom: 10px; border-bottom: 1px solid #0d1f4a; padding-bottom: 6px;
    }
    .cards { display: flex; flex-direction: column; gap: 10px; }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid #1a2e5a;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .card-icon { font-size: 1.5rem; flex-shrink: 0; margin-top: 2px; }
    .card-name { font-size: 1rem; font-weight: 600; color: #c8d8ff; }
    .card-sub { font-size: 0.8rem; color: #5577aa; margin-top: 2px; }
    .card-desc { font-size: 0.85rem; color: #99aad0; margin-top: 5px; line-height: 1.5; }
    .badge {
      display: inline-block; font-size: 0.7rem; padding: 2px 8px;
      border-radius: 10px; margin-left: 6px; vertical-align: middle;
    }
    .badge-messier { background: rgba(100,180,255,0.15); color: #64b4ff; border: 1px solid #2255aa; }
    .badge-star    { background: rgba(255,215,0,0.12);  color: #ffd700; border: 1px solid #886600; }
    .badge-planet  { background: rgba(180,100,255,0.15); color: #c87aff; border: 1px solid #6633aa; }
    .tip {
      background: rgba(255,215,0,0.06);
      border: 1px solid #3a3000;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #ccbb66;
      line-height: 1.6;
      margin-top: 20px;
    }
    .tip::before { content: "💡 관측 팁  "; font-weight: 700; }
  </style>
</head>

function showMonth(idx) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  const d = data[idx];
  document.getElementById('content').innerHTML = `
    <div class="month-panel active">
      <div class="month-title">🌙 ${d.month} 고흥 밤하늘</div>
      <div class="month-desc">${d.desc}</div>
      <div class="section">
        <div class="section-title">⭕ 메시에 천체 / 성운 · 성단 · 은하</div>
        <div class="cards">${d.messier.map(o=>`
          <div class="card">
            <div class="card-icon">${o.icon}</div>
            <div>
              <div class="card-name">${o.name}<span class="badge badge-messier">Messier</span></div>
              <div class="card-sub">${o.sub}</div>
              <div class="card-desc">${o.desc}</div>
            </div>
          </div>`).join('')}
        </div>
      </div>
      <div class="section">
        <div class="section-title">⭐ 주요 별 · 별자리</div>
        <div class="cards">${d.stars.map(o=>`
          <div class="card">
            <div class="card-icon">${o.icon}</div>
            <div>
              <div class="card-name">${o.name}<span class="badge badge-star">별</span></div>
              <div class="card-sub">${o.sub}</div>
              <div class="card-desc">${o.desc}</div>
            </div>
          </div>`).join('')}
        </div>
      </div>
      <div class="tip">${d.tip}</div>
    </div>`;
}

// 현재 달로 초기화
const now = new Date();
showMonth(now.getMonth());
document.querySelectorAll('.tab-btn')[now.getMonth()].classList.add('active');
document.querySelectorAll('.tab-btn').forEach((b,i)=>{
  if(i !== now.getMonth()) b.classList.remove('active');
});
</script>
